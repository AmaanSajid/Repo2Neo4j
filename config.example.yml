repository:
  path: /path/to/local/repo
  name: my-project
  branch: main                    # branch to ingest (default: repo's default branch)

gitlab:
  url: https://gitlab.company.com
  project_id: 123
  private_token: ${GITLAB_TOKEN}
  branch: main                    # only fetch MRs targeting this branch (omit for all MRs)

neo4j:
  uri: bolt://localhost:7687
  username: neo4j
  password: ${NEO4J_PASSWORD}
  database: neo4j

parsing:
  ast_enabled: true
  languages:
    - python
    - typescript
    - javascript
    - java
  ignore_patterns:
    - "node_modules/**"
    - "*.min.js"
    - "vendor/**"
    - "__pycache__/**"
    - ".git/**"
    - "*.pyc"
    - "dist/**"
    - "build/**"

sync:
  batch_size: 500
  max_commits: null
