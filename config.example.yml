# ── Option A: Local clone + optional GitLab MRs ──
# repository:
#   path: /path/to/local/repo
#   name: my-project
#   branch: main
#
# gitlab:                              # optional — adds MR data on top of local Git history
#   url: https://gitlab.company.com
#   project_id: 123
#   private_token: ${GITLAB_TOKEN}
#   branch: main

# ── Option B: GitLab-only (no local clone needed) ──
# Just provide gitlab credentials, omit repository.path
#
# repository:
#   name: my-project                   # optional — defaults to "project-<project_id>"
#
# gitlab:
#   url: https://gitlab.company.com
#   project_id: 123
#   private_token: ${GITLAB_TOKEN}
#   branch: main                       # which branch to ingest

# ── Active config (edit this) ──

repository:
  name: my-project
  # path: /path/to/local/repo         # uncomment for local clone mode

gitlab:
  url: https://gitlab.company.com
  project_id: 123
  private_token: ${GITLAB_TOKEN}
  branch: main

neo4j:
  uri: bolt://localhost:7687
  username: neo4j
  password: ${NEO4J_PASSWORD}
  database: neo4j

parsing:
  ast_enabled: true
  languages:
    - python
    - typescript
    - javascript
    - java
  ignore_patterns:
    - "node_modules/**"
    - "*.min.js"
    - "vendor/**"
    - "__pycache__/**"
    - ".git/**"
    - "*.pyc"
    - "dist/**"
    - "build/**"

sync:
  batch_size: 500
  max_commits: null
